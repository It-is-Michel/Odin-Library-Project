<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="stylesheet" href="./css/normalize.css">
  <link rel="stylesheet" href="./css/styles.css">
  <script src="script.js" defer></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Library</title>

</head>
<body>

  <div class="body-wrapper">
    
    <header class="header">
      <div class="header__my-library-logotype">MyLibrary</div>
      <a class="my-library-github-link" href="https://github.com/It-is-Michel/Odin-Library-Project"></a>
    </header>
  
    <div class="library">
      <div class="library__controls-container">
        <button type="button" class="library__add-book-button"></button>
        <button type="button" class="library__edit-book-button"></button>
        <button type="button" class="library__delete-book-button"></button>
      </div>
  
      <main class="library__books">
        <!-- Books added with javascript go here -->
        <article class="book">
          <div class="book__cover"></div>
          <div class="book__title-wrapper">
            <h1 class="book__title">Book title</h1>
            <cite class="book__author">by Book author</cite>
          </div>
          <p class="book__summary">Lorem ipsum dolor sit amet consectetur adipisicing elit. Eius laudantium doloribus ratione iste expedita ad placeat nostrum ipsum, quasi sit similique ipsam quo veniam vitae consequatur culpa aut.</p>
          <span class="book__pages"><span class="book__read-status-reading">Reading</span>10 / 100 pages</span>
        </article>
      </main>
    </div>
    
  </div>
    
  <div class="overlay">

    <form id="modifyBookForm" class="modify-book-form" novalidate>

      <div class="modify-book-form__book-wrapper">
        <div id="modifyBookFormCoverSelectFile" class="book__edit-cover"></div>
        <div class="book__title-wrapper">
          <input id="modifyBookFormTitleInput" class="book__edit-title-input" placeholder="Add title..." maxlength="20" cols="0"></input>
          <cite class="book__edit-author-wrapper">by<input id="modifyBookFormAuthorInput" class="book__edit-author-input" placeholder="add author..." maxlength="30"></input></cite>
        </div>
        <textarea id="modifyBookFormEditSummaryTextarea" class="book__edit-summary-textarea" placeholder="Add summary..."></textarea>
        
        <span class="book__pages">
          <span class="book__read-status-editing">Editing</span>
          <div class="book__pages-wrapper">
            <input id="modifyBookFormPagesReadInput" class="book__pages-read-input" placeholder="0" pattern="[0-9]+" min="0" maxlength="4"> /
            <input id="modifyBookFormTotalPagesInput" class="book__total-pages-input" placeholder="999" pattern="[0-9]+" min="1" maxlength="4"> pages
          </div>
        </span>
      </div>

      <div class="modify-book-form__buttons-wrapper">
        <button id="modifyBookFormCancelButton" class="modify-book-form__cancel-button" type="button">Cancel</button>
        <button id="modifyBookFormAcceptButton" class="modify-book-form__add-book-button" type="button">Add</button>
      </div>
      
    </form>

  </div>

</body>
</html>
